<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI phân tích doanh thu</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/qMwK7h1n/xgame.png">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-dark: #050505;
        --cyan-neon: #00f2fe;
        --cyan-glow: rgba(0, 242, 254, 0.5);
        --text-white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-dark);
        height: 100vh;
        display: flex; justify-content: center; align-items: center; 
        overflow: hidden; position: relative;
    }

    /* CANVAS NỀN CODE RƠI */
    #matrix {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 0;
        opacity: 0.15; /* Chỉnh độ đậm nhạt của code nền ở đây */
    }

    .chat-container { 
        width: 95%; max-width: 850px; height: 90vh; 
        background: rgba(10, 10, 15, 0.85); 
        border: 2px solid var(--cyan-neon);
        border-radius: 8px;
        display: flex; flex-direction: column; 
        box-shadow: 0 0 25px var(--cyan-glow);
        backdrop-filter: blur(8px);
        position: relative; z-index: 10;
    }

    .chat-header { 
        padding: 15px 25px;
        background: rgba(0, 0, 0, 0.9);
        border-bottom: 2px solid var(--cyan-neon);
        display: flex; align-items: center; gap: 15px;
        border-radius: 8px 8px 0 0;
    }

    .avt {
        width: 45px; height: 45px;
        border: 2px solid var(--cyan-neon);
        box-shadow: 0 0 10px var(--cyan-glow);
    }

    .header-info b {
        color: var(--cyan-neon);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 15px;
        text-shadow: 0 0 8px var(--cyan-neon);
    }

    .status {
        font-size: 11px; color: #00ff00;
        display: flex; align-items: center; gap: 5px;
        font-family: 'Fira Code', monospace;
        margin-top: 3px;
    }

    .messages { 
        flex: 1; overflow-y: auto; padding: 25px;
        background: rgba(0,0,0,0.1);
    }

    .msg { 
        margin-bottom: 20px; padding: 14px 18px; 
        max-width: 85%; line-height: 1.6; font-size: 15px;
        border-radius: 4px;
    }

    /* USER MSG: KHÔNG CÒN CHỮ ĐEN */
    .user { 
        background: rgba(0, 242, 254, 0.15);
        color: var(--text-white); 
        margin-left: auto; 
        border: 1px solid var(--cyan-neon);
        font-weight: 700;
        text-shadow: 0 0 5px var(--cyan-glow);
    }

    /* BOT MSG: CHỮ CYAN NHẠT */
    .bot { 
        background: rgba(20, 20, 30, 0.8);
        color: #d1faff; 
        margin-right: auto;
        font-family: 'Fira Code', monospace;
        border-left: 4px solid var(--cyan-neon);
        white-space: pre-wrap;
    }

    .input-area { 
        padding: 20px; background: rgba(0, 0, 0, 0.9);
        border-top: 1px solid var(--cyan-neon);
        border-radius: 0 0 8px 8px;
    }

    .input-box {
        display: flex; background: #111;
        border: 1px solid #333; border-radius: 6px; padding: 8px;
    }

    .input-box:focus-within { border-color: var(--cyan-neon); box-shadow: 0 0 12px var(--cyan-glow); }

    textarea { 
        flex: 1; background: transparent; border: none;
        color: var(--text-white); padding: 10px;
        height: 50px; resize: none; outline: none; font-size: 15px;
        font-family: 'Fira Code', monospace;
    }
    textarea::placeholder { color: rgba(0, 242, 254, 0.4); }

    .send-btn { 
        width: 50px; background: transparent; border: none;
        color: var(--cyan-neon); cursor: pointer;
        display: flex; justify-content: center; align-items: center;
    }

    /* Tùy chỉnh thanh cuộn */
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--cyan-neon); border-radius: 10px; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="chat-container">
    <div class="chat-header">
        <img class="avt" src="https://i.ibb.co/qMwK7h1n/xgame.png" alt="X-Game">
        <div class="header-info">
            <b>AI QUÁN NET XGAME</b>
            <div class="status">● ĐANG TRỰC TUYẾN</div>
        </div>
    </div>
    
    <div id="messages" class="messages">
        <div class="msg bot">> Kích Hoạt AI Thành Công✅
> Phiên Bản: v2 Nâng Cấp Giao Diện
> Nhập dữ liệu báo cáo hoặc dùng /kiemsoban, /kiemtien</div>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <textarea id="input" placeholder="Nhập doanh thu tại đây..."></textarea>
            <button class="send-btn" onclick="send()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
// --- CANVAS MATRIX EFFECT ---
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const codes = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/{}[];:+-*";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00f2fe";
    ctx.font = fontSize + "px 'Fira Code'";

    for (let i = 0; i < drops.length; i++) {
        const text = codes.charAt(Math.floor(Math.random() * codes.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 50);

// --- LOGIC XỬ LÝ CHAT GỐC CỦA BẠN (GIỮ NGUYÊN) ---
let tienDichVu=0;
let tienDoAn=0;
let chenhlech=0;

const messages=document.getElementById("messages");
const input=document.getElementById("input");
let kiemSoBanMode=false;
let kiemStep=0;
let kiemTienMode = false;
let kiemTienStep = 0;
let soDuCuoi = 0;
let soDuTruoc = 0;
let tienMomo = 0;

let kiemItems=[
{name:"🥤 Nước 18k",gia:18000},
{name:"🥤 Nước 15k",gia:15000},
{name:"🥤 Nước 12k",gia:12000},
{name:"🥤 Nước 10k",gia:10000,type:"nuoc10"},
{name:"🍦 Kem",gia:15000},
{name:"🍜 Tổng mỳ",gia:10000,type:"my"},
{name:"🍙 Kimbap",gia:20000},
{name:"🌭 Xúc xích",gia:10000},
{name:"🥚 Trứng",gia:10000},
{name:"🍟 Snack",gia:10000},
{name:"🚬 Thuốc",gia:25000}
];

let tongMyTam=0;
let tongNuoc10Tam=0;
let tongTien=0;
let dangMenuKetThuc=false;
let dangNhapComboNuoc10=false;
let dangNhapMyNuoc=false;
input.addEventListener("keydown", function(e){
if(e.key === "Enter" && !e.shiftKey){
e.preventDefault(); // không xuống dòng
send(); // gửi tin nhắn
}
});

function addMsg(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.textContent=text;
messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
}

function phanTichDoanhThu(text){

let nuoc10=0,tien10=0;
let comboNuoc10=0;
let nuoc12=0,tien12=0;
let nuoc15=0,tien15=0;
let nuoc18=0,tien18=0;

let myNuoc=0,tienMyNuoc=0;
let myXao=0,tienMyXao=0;

let kimbap=0,tienKimbap=0;
let xucxich=0,tienXucxich=0;
let trung=0,tienTrung=0;
let kem=0,tienKem=0;
let snack=0,tienSnack=0;
let thuoc=0,tienThuoc=0;

let lines=text.split("\n");
let tongBaoCao=0;

for(let line of lines){

let tongMatch=line.match(/Tổng\s*cộng\s*([\d,]+)/i);
if(tongMatch){
tongBaoCao=parseInt(tongMatch[1].replace(/,/g,""));
}

if(!line.includes("Tổng cộng:")) continue;

let match=line.match(/Tổng cộng:\s*(.*?)\s+(\d+)\s+([\d,]+)/i);
if(!match) continue;

let ten=match[1].toUpperCase();
let soLuong=parseInt(match[2]);
let tien=parseInt(match[3].replace(/,/g,""));

let gia=Math.round(tien/soLuong);


// ===== NƯỚC =====
if(/STING|PEPSI|COCA|MIRINDA|SPRITE|AQUA|REVIVE|RIVIVE|ROCK|OLONG|O LONG|TRA|TRÀ|COZY|SUA|SỮA|NUTRI|TRAU|HUC|HÚC/i.test(ten)){
  
if(gia<=10000){

nuoc10+=soLuong;
tien10+=tien;

// chỉ tính combo cho sting vàng, pepsi, aqua
if(/STING VANG|PEPSI|AQUA/i.test(ten)){

let chaiTinhTien = Math.round(tien/10000);
let chaiCombo = soLuong - chaiTinhTien;

if(chaiCombo>0){
comboNuoc10 += chaiCombo;
}

}

}
else if(gia<=12000){nuoc12+=soLuong;tien12+=tien;}
else if(gia<=15000){nuoc15+=soLuong;tien15+=tien;}
else{nuoc18+=soLuong;tien18+=tien;}

}


// ===== MỲ =====
else if(ten.includes("MY") || ten.includes("MỲ")){

if(ten.includes("XAO")){
myXao+=soLuong;
tienMyXao+=soLuong*20000;
}else{
myNuoc+=soLuong;
tienMyNuoc+=soLuong*10000;
}

// trứng kèm mỳ
if(/TRUNG|TRỨNG|OP LA|ỐP LA|LUOT|LUỘC/i.test(ten)){
trung+=soLuong;
tienTrung+=soLuong*10000;
}

// xúc xích kèm mỳ
if(/XUC XICH|XÚC XÍCH/i.test(ten)){
xucxich+=soLuong;
tienXucxich+=soLuong*10000;
}

}


// ===== TRỨNG RIÊNG =====
else if(/TRUNG|TRỨNG|OP LA|ỐP LA|LUOT|LUỘC/i.test(ten)){
trung+=soLuong;
tienTrung+=soLuong*10000;
}


// ===== KIMBAP =====
else if(ten.includes("KIMBAP")){
kimbap+=soLuong;
tienKimbap+=soLuong*20000;
}


// ===== XÚC XÍCH =====
else if(/XUC XICH|XÚC XÍCH/i.test(ten)){
xucxich+=soLuong;
tienXucxich+=tien;
}


// ===== KEM =====
else if(ten.includes("KEM")){
kem+=soLuong;
tienKem+=soLuong*15000;
}


// ===== SNACK =====
else if(/BIM|SNACK/i.test(ten)){
snack+=soLuong;
tienSnack+=tien;
}


// ===== THUỐC =====
else if(/THUOC|THUỐC/i.test(ten)){
thuoc+=soLuong;
tienThuoc+=soLuong*25000;
}

}

let tongMy = myNuoc + myXao;
let tienTongMy = tienMyNuoc + tienMyXao;

let tongAI=
tien10+
tien12+
tien15+
tien18+
tienMyNuoc+
tienMyXao+
tienKimbap+
tienXucxich+
tienTrung+
tienKem+
tienSnack+
tienThuoc;

let tong = tongBaoCao || tongAI;

let kiemTra="";

if(tongBaoCao && tongBaoCao!==tongAI){
kiemTra=`⚠️ Phát hiện AI tính sai doanh thu
🚫 Hãy báo cho Đại ngay!
✅ Tính tay tạm đi để không bị thiếu hàng
📄 Tổng báo cáo: ${tongBaoCao.toLocaleString()} đ
🤖 AI tính sai thành: ${tongAI.toLocaleString()} đ

`;
}

return `${kiemTra}📊 PHÂN TÍCH DOANH THU
----------------------------
🥤 Nước 10k : ${nuoc10} món - ${tien10.toLocaleString()} đ
🥤 Nước 12k : ${nuoc12} món - ${tien12.toLocaleString()} đ
🥤 Nước 15k : ${nuoc15} món - ${tien15.toLocaleString()} đ
🥤 Nước 18k : ${nuoc18} món - ${tien18.toLocaleString()} đ

🍜 Mỳ nước  : ${myNuoc} món - ${tienMyNuoc.toLocaleString()} đ
🍜 Mỳ xào   : ${myXao} món - ${tienMyXao.toLocaleString()} đ
🍜 Tổng mỳ  : ${tongMy} món - ${tienTongMy.toLocaleString()} đ

🍙 Kimbap   : ${kimbap} món - ${tienKimbap.toLocaleString()} đ
🌭 Xúc xích : ${xucxich} món - ${tienXucxich.toLocaleString()} đ
🥚 Trứng    : ${trung} món - ${tienTrung.toLocaleString()} đ
🍦 Kem      : ${kem} món - ${tienKem.toLocaleString()} đ
🍟 Snack    : ${snack} món - ${tienSnack.toLocaleString()} đ

🚬 Thuốc lá : ${thuoc} món - ${tienThuoc.toLocaleString()} đ

🎁 Nước Combo 0đ: ${comboNuoc10} chai

💰 TỔNG CỘNG    :${tongAI.toLocaleString()} đ
----------------------------`;
}

function send(){

let text=input.value.trim();
if(!text) return;

addMsg(text,"user");
// ===== LỆNH QUAY LẠI =====
if((text=="/back" || text=="//") && (kiemSoBanMode || kiemTienMode)){

addMsg("↩️ Đã quay lại nhập lại từ đầu","bot");

// reset kiểm sổ
kiemSoBanMode = false;
kiemStep = 0;
tongTien = 0;
tienDoAn = 0;
tongMyTam = 0;
tongNuoc10Tam = 0;

// reset kiểm tiền
kiemTienMode = true;
kiemTienStep = 1;
soDuCuoi = 0;
soDuTruoc = 0;
tienMomo = 0;

setTimeout(()=>{
addMsg("👉 Nhập số dư cuối","bot");
},300);

input.value="";
return;
}

// ===== LỆNH THOÁT =====
if(text=="/thoat"){

kiemSoBanMode=false;
dangMenuKetThuc=false;
kiemStep=0;
tongMyTam=0;
tongNuoc10Tam=0;

addMsg("❌ Đã thoát chế độ kiểm sổ bán\n📊 Trở về chế độ phân tích doanh thu","bot");

input.value="";
return;
}
// ===== LỆNH KIỂM TIỀN =====
if(text=="/kiemtien"){

    kiemTienMode = true;
    kiemTienStep = 1;

    addMsg("💰 Đã kích hoạt chế độ kiểm doanh thu","bot");

    setTimeout(()=>{
        addMsg("👉 Nhập số dư cuối","bot");
    },300);

    input.value="";
    return;
}
// ===== LỆNH KIỂM SỔ BÁN =====
if(text=="/kiemsoban"){

kiemSoBanMode=true;
kiemStep=-1;
tongTien=0;

addMsg("✅ Đã kích hoạt chế độ kiểm số bán","bot");

setTimeout(()=>{
addMsg("💰 Nhập số tiền dịch vụ ở trên máy","bot");
},300);

input.value="";
return;
}

// ===== MENU SAU KHI KIỂM XONG =====
if(dangMenuKetThuc){

// ===== MENU KIỂM SỔ =====
if(dangMenuKetThuc === true){

if(text==="1"){
dangMenuKetThuc=false;
kiemSoBanMode=true;
kiemStep=-1;
tongTien=0;

addMsg("🔄 Bắt đầu kiểm sổ mới","bot");

setTimeout(()=>{
addMsg("💰 Nhập số tiền dịch vụ ở trên máy","bot");
},300);

input.value="";
return;
}

if(text==="2"){
dangMenuKetThuc=false;
kiemSoBanMode=false;

addMsg("👋 Đã thoát chế độ kiểm sổ","bot");

input.value="";
return;
}
}

// ===== MENU KIỂM TIỀN =====
if(dangMenuKetThuc === "kiemtien"){

if(text==="1"){
dangMenuKetThuc=false;

kiemTienMode=true;
kiemTienStep=1;

addMsg("🔄 Bắt đầu kiểm tiền mới","bot");

setTimeout(()=>{
addMsg("👉 Nhập số dư cuối","bot");
},300);

input.value="";
return;
}

if(text==="2"){
dangMenuKetThuc=false;

addMsg("👋 Đã thoát chế độ kiểm tiền","bot");

input.value="";
return;
}
}

addMsg("⚠️ Vui lòng nhập 1 hoặc 2","bot");

input.value="";
return;
}

// ===== CHẾ ĐỘ KIỂM TIỀN =====
if(kiemTienMode){

    let so = parseFloat(text);

    if(isNaN(so)){
        addMsg("⚠️ Vui lòng nhập số hợp lệ","bot");
        input.value="";
        return;
    }

    // BƯỚC 1: SỐ DƯ CUỐI
    if(kiemTienStep === 1){
        soDuCuoi = so;
        kiemTienStep = 2;

        addMsg(`💰 Số dư cuối: ${soDuCuoi}`,"bot");

        setTimeout(()=>{
            addMsg("👉 Nhập số dư ca trước","bot");
        },300);

        input.value="";
        return;
    }

    // BƯỚC 2: SỐ DƯ CA TRƯỚC
    if(kiemTienStep === 2){
        soDuTruoc = so;
        kiemTienStep = 3;

        addMsg(`💰 Số dư ca trước: ${soDuTruoc}`,"bot");

        setTimeout(()=>{
            addMsg("👉 Nhập số tiền trong MoMo","bot");
        },300);

        input.value="";
        return;
    }

    // BƯỚC 3: MOMO
    if(kiemTienStep === 3){
        tienMomo = so;
        kiemTienStep = 4;

        addMsg(`📱 Tiền MoMo: ${tienMomo}`,"bot");

        setTimeout(()=>{
            addMsg("👉 Nhập tổng doanh thu","bot");
        },300);

        input.value="";
        return;
    }

    // BƯỚC 4: TÍNH TOÁN CHUẨN
    if(kiemTienStep === 4){
        let tongDoanhThu = so;

        let ketqua = soDuCuoi - soDuTruoc;
        let tongMoi = ketqua + tienMomo;
        let tienMat = tongDoanhThu - tongMoi;

        addMsg(
`📊 CÔNG THỨC
------------------------
💰 Tổng doanh thu : ${tongDoanhThu}

📈 Kết quả 1        : ${soDuCuoi} - ${soDuTruoc} = ${ketqua}
📱 MoMo           : ${tienMomo}

📊 Tổng (Momo + Kết quả 2): ${tienMomo} + ${ketqua} = ${tongMoi}

💵 Tiền mặt       : ${tongDoanhThu} - ${tongMoi} = ${tienMat}
------------------------`,
        "bot");

        // 👉 thêm dòng này
setTimeout(()=>{
    addMsg(
`✅ KẾT QUẢ
------------------------
Doanh thu: ${tongDoanhThu}
Chuyển khoản: ${tienMomo} + ${ketqua}
Tiền mặt: ${tienMat}
------------------------`, "bot");
},300);

// hiển thị menu giống kiểm sổ
setTimeout(()=>{
addMsg(`📋 Bạn muốn làm gì tiếp?

1️⃣ Kiểm tiền lại từ đầu
2️⃣ Thoát chế độ kiểm tiền`,"bot");

dangMenuKetThuc = "kiemtien";
},300);

// reset step nhưng giữ menu
kiemTienMode = false;
kiemTienStep = 0;

input.value="";
return;
    }
}
if(kiemSoBanMode){

// bước nhập tiền dịch vụ
if(kiemStep==-1){

let so=parseFloat(text);

if(isNaN(so)){

addMsg("⚠️ Bạn phải nhập số tiền dịch vụ hợp lệ (chỉ nhập số)","bot");

input.value="";
return;

}

let tien=so*1000;

tienMay = tien;   // tiền nhập trên máy
tienDichVu = tien; // tiền dịch vụ
tongTien = 0;
tienDoAn = 0;

addMsg(`💰 Tiền dịch vụ: ${tien.toLocaleString()} đ`,"bot");

kiemStep=0;

setTimeout(()=>{
addMsg(`${kiemItems[0].name}: nhập số lượng`,"bot");
},300);

input.value="";
return;

}

let so=parseInt(text);

if(isNaN(so)){
addMsg(`⚠️ Bạn phải nhập số lượng hợp lệ.
👉 Vui lòng nhập lại: ${kiemItems[kiemStep].name}`,"bot");

input.value="";
return;
}
// các bước hàng hóa
// combo nước 10k
if(tongNuoc10Tam>0){

let combo=so;
let tinhTien=tongNuoc10Tam-combo;

let tien=tinhTien*10000;

tongTien += tien;
tienDoAn += tien;

addMsg(`🥤 Nước 10k tính tiền: ${tinhTien} → ${tien.toLocaleString()} đ`,"bot");

tongNuoc10Tam=0;

setTimeout(()=>{
addMsg(`${kiemItems[kiemStep].name}: nhập số lượng`,"bot");
},300);

input.value="";
return;
}


// mỳ nước / mỳ xào
if(tongMyTam>0){

let myNuoc=so;
let myXao=tongMyTam-myNuoc;

let tienNuoc=myNuoc*10000;
let tienXao=myXao*20000;

tongTien+=tienNuoc+tienXao;
