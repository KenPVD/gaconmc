<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI PHÂN TÍCH DOANH THU</title>
<style>
    body { 
        font-family: Arial, sans-serif; 
        background: url("https://i.ibb.co/h1tS5qs0/25ecc83e-010d-4d31-8011-d02e7bd20c52.jpg") center/cover no-repeat fixed;
        margin: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
    }
    
    .chat { 
        width: 650px; 
        height: 90vh; 
        background: rgba(255, 255, 255, 0.9); 
        border-radius: 15px; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
    }

    .chat-header { 
        text-align: center; 
        font-size: 20px; 
        font-weight: bold; 
        color: white; 
        background: linear-gradient(90deg,#00c6ff,#0072ff); 
        padding: 15px; 
    }

    .messages { 
        flex: 1; 
        overflow-y: auto; 
        padding: 15px; 
        background: rgba(248, 250, 252, 0.4); 
    }

    .msg { 
        margin-bottom: 15px; 
        padding: 12px; 
        border-radius: 8px; 
        max-width: 95%; 
        white-space: pre-wrap; 
        line-height: 1.5; 
    }

    .user { background: #3b82f6; color: white; margin-left: auto; font-size: 12px; }

    .bot { 
        background: #ffffff; 
        color: #1e293b; 
        border: 1px solid #e2e8f0; 
        font-family: "Courier New", Courier, monospace; 
        font-size: 14px; 
        font-weight: bold; 
    }

    .input { display: flex; border-top: 1px solid #ddd; background: white; }

    textarea { flex: 1; border: none; padding: 15px; resize: none; height: 70px; outline: none; }

    button { width: 80px; border: none; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div class="chat">
    <div class="chat-header">🤖 AI CỦA VIỆT ĐẠI :)))</div>
    <div id="messages" class="messages"></div>
    <div class="input">
        <textarea id="input" placeholder="Dán báo cáo doanh thu vào đây..."></textarea>
        <button onclick="send()">GỬI</button>
    </div>
</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

input.addEventListener("keydown", (e) => {
    if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

function addMsg(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function phanTichDoanhThu(text) {
    let nuoc10=0, tien10=0, comboNuoc10=0;
    let nuoc12=0, tien12=0, nuoc15=0, tien15=0, nuoc18=0, tien18=0;
    let myNuoc=0, tienMyNuoc=0, myXao=0, tienMyXao=0;
    let kimbap=0, tienKimbap=0, xucxich=0, tienXucxich=0;
    let trung=0, tienTrung=0, kem=0, tienKem=0, snack=0, tienSnack=0, thuoc=0, tienThuoc=0;
    
    let tongBaoCao = 0;

    // 1. Tìm tổng doanh thu chốt từ báo cáo gốc
    let lines = text.split('\n');
    for (let line of lines) {
        let matchChot = line.match(/Tổng\s*cộng\s+([\d,.]+)/i);
        if (matchChot && !line.toUpperCase().includes("NHANVIEN") && !line.toUpperCase().includes("ADMIN")) {
            tongBaoCao = parseInt(matchChot[1].replace(/[,.]/g, ""));
        }
    }

    // 2. Làm phẳng văn bản
    let flatText = text.replace(/\n/g, " ").replace(/\s+/g, " ");

    // 3. Quét dữ liệu món hàng
    let regex = /Tổng cộng[:]\s*(.*?)\s+(\d+)\s+([\d,.]+)\s+(NHANVIEN|ADMIN|NHÂN VIÊN)/gi;
    let match;

    while ((match = regex.exec(flatText)) !== null) {
        let ten = match[1].toUpperCase().trim();
        let soLuong = parseInt(match[2]);
        let tien = parseInt(match[3].replace(/[,.]/g, ""));
        let gia = Math.round(tien / soLuong);

        if (/STING|PEPSI|COCA|MIRINDA|SPRITE|AQUA|REVIVE|RIVIVE|ROCK|OLONG|O LONG|TRA|TRÀ|COZY|SUA|SỮA|NUTRI|HUC|HÚC/i.test(ten)) {
            if (gia <= 10500) { 
                nuoc10 += soLuong; tien10 += tien; 
                if (/PEPSI|STING|AQUA/i.test(ten)) {
                    let thucTra = Math.round(tien / 10000);
                    if (soLuong > thucTra) comboNuoc10 += (soLuong - thucTra);
                }
            }
            else if (gia <= 13000) { nuoc12 += soLuong; tien12 += tien; }
            else if (gia <= 16000) { nuoc15 += soLuong; tien15 += tien; }
            else { nuoc18 += soLuong; tien18 += tien; }
        } 
        else if (ten.includes("MY") || ten.includes("MỲ")) {
            if (ten.includes("XAO")) { 
                myXao += soLuong; 
                tienMyXao += (soLuong * 20000); 
            } else { 
                myNuoc += soLuong; 
                tienMyNuoc += (soLuong * 10000); 
            }
            // Tính trứng/xúc xích đi kèm trong tên mỳ
            if (/TRUNG|TRỨNG|OP LA|ỐP LA/i.test(ten)) { trung += soLuong; tienTrung += (soLuong * 10000); }
            if (/XUC XICH|XÚC XÍCH/i.test(ten)) { xucxich += soLuong; tienXucxich += (soLuong * 10000); }
        }
        else if (ten.includes("KIMBAP")) { kimbap += soLuong; tienKimbap += tien; }
        else if (/XUC XICH|XÚC XÍCH/i.test(ten)) { xucxich += soLuong; tienXucxich += tien; }
        else if (/TRUNG|TRỨNG|OP LA/i.test(ten)) { trung += soLuong; tienTrung += (soLuong * 10000); }
        else if (ten.includes("KEM")) { kem += soLuong; tienKem += tien; }
        else if (/BIM|SNACK/i.test(ten)) { snack += soLuong; tienSnack += tien; }
        else if (/THUOC|THUỐC/i.test(ten)) { thuoc += soLuong; tienThuoc += tien; }
    }

    // TÍNH TỔNG MỲ
    let tongSoLuongMy = myNuoc + myXao;
    let tongTienMy = tienMyNuoc + tienMyXao;

    let tongAI = tien10 + tien12 + tien15 + tien18 + tienMyNuoc + tienMyXao + tienKimbap + tienXucxich + tienTrung + tienKem + tienSnack + tienThuoc;

    let kiemTra = "";
    if (tongBaoCao > 0 && tongBaoCao !== tongAI) {
        kiemTra = `⚠️ Phát hiện AI tính sai doanh thu\n🚫 Hãy báo cho Đại ngay!\n✅ Tính tay tạm đi để không bị thiếu hàng\n📄 Tổng báo cáo: ${tongBaoCao.toLocaleString()} đ\n🤖 AI tính sai thành: ${tongAI.toLocaleString()} đ\n\n`;
    }

    return `${kiemTra}📊 PHÂN TÍCH DOANH THU
----------------------------
🥤 Nước 10k : ${nuoc10.toString().padEnd(2)} món - ${tien10.toLocaleString()}đ
🥤 Nước 12k : ${nuoc12.toString().padEnd(2)} món - ${tien12.toLocaleString()}đ
🥤 Nước 15k : ${nuoc15.toString().padEnd(2)} món - ${tien15.toLocaleString()}đ
🥤 Nước 18k : ${nuoc18.toString().padEnd(2)} món - ${tien18.toLocaleString()}đ

🍜 Mỳ nước  : ${myNuoc.toString().padEnd(2)} món - ${tienMyNuoc.toLocaleString()}đ
🍜 Mỳ xào   : ${myXao.toString().padEnd(2)} món - ${tienMyXao.toLocaleString()}đ
🍜 Tổng mỳ  : ${tongSoLuongMy.toString().padEnd(2)} món - ${tongTienMy.toLocaleString()}đ

🍙 Kimbap   : ${kimbap.toString().padEnd(2)} món - ${tienKimbap.toLocaleString()}đ
🌭 Xúc xích : ${xucxich.toString().padEnd(2)} món - ${tienXucxich.toLocaleString()}đ
🥚 Trứng    : ${trung.toString().padEnd(2)} món - ${tienTrung.toLocaleString()}đ
🍦 Kem      : ${kem.toString().padEnd(2)} món - ${tienKem.toLocaleString()}đ
🍟 Snack    : ${snack.toString().padEnd(2)} món - ${tienSnack.toLocaleString()}đ
🚬 Thuốc lá : ${thuoc.toString().padEnd(2)} món - ${tienThuoc.toLocaleString()}đ

🎁 Nước Combo 0đ: ${comboNuoc10} chai
💰 TỔNG CỘNG    : ${tongAI.toLocaleString()} đ
----------------------------`;
}

function send() {
    let text = input.value.trim();
    if (!text) return;
    addMsg(text, "user");
    let result = phanTichDoanhThu(text);
    setTimeout(() => { addMsg(result, "bot"); }, 300);
    input.value = "";
}
</script>
</body>
</html>
